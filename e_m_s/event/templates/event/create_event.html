<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f6f8fb; }
        .container { max-width: 600px; margin: auto; background: white; padding: 2rem; border-radius: 8px; }
        form { display: grid; gap: 0.75rem; }
        input, textarea, select, button { padding: 0.7rem; font-size: 1rem; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Event</h1>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Event title" required>
            <textarea name="description" rows="4" placeholder="Event description"></textarea>
            <input type="date" name="date" required>
            <select name="status">
                <option value="Planned">Planned</option>
                <option value="Ongoing">Ongoing</option>
                <option value="Completed">Completed</option>
            </select>
            <button type="submit">Save Event</button>
        </form>
        <p><a href="{% url 'home' %}">Back to events</a></p>
    </div>
</body>
</html>

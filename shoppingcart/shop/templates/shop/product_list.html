<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Products</title>
    </head>
    <body>
        <h1>Products</h1>
        <a href="{% url 'cart_view' %}">View Cart</a>
        {% if products %}
        <ul>
            {% for product in products %}
            <li><strong>{{ product.name }}</strong> — ${{ product.price }} <a href="{% url 'add_to_cart' product.id %}">Add to cart</a></li>
            {% empty %}
            <li>No products available.</li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No products available.</p>
        {% endif %}
    </body>
</html>

{% extends 'base.html' %}

{% block content %}
<div class="form-box">
    <h2>Add Asset</h2>

    <form method="POST">
        {% csrf_token %}
        
        {% if form.non_field_errors %}
            <div class="error-message">
                {{ form.non_field_errors }}
            </div>
        {% endif %}
        
        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <span class="error-message">{{ field.errors }}</span>
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit" class="btn">Save Asset</button>
    </form>
</div>
{% endblock %}

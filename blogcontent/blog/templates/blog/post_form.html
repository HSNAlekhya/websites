{% extends "base.html" %}
{% block content %}
<style>
    .post-form-card{max-width:720px;margin:0 auto;background:linear-gradient(135deg,#fff9f0,#f0f9ff);padding:22px;border-radius:12px;box-shadow:0 10px 30px rgba(2,6,23,0.06)}
    .post-form-card h1{margin-top:0;color:#b453ff}
    .post-form-card p.help{color:#6b7280;font-size:0.9rem}
    .post-form-card input[type=text], .post-form-card textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #e6edf3;margin-top:6px}
    .form-actions{margin-top:14px}
    .btn-primary{background:#7c3aed;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer}
    .btn-secondary{background:transparent;border:2px solid #7c3aed;color:#7c3aed;padding:8px 12px;border-radius:8px;margin-left:8px;text-decoration:none}
</style>

<div class="post-form-card">
    <h1>New Post</h1>
    <p class="help">Write a clear title and body for your post. Add a short slug for the URL.</p>
    <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button class="btn-primary" type="submit">Save</button>
            <a class="btn-secondary" href="{% url 'blog:post_list' %}">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}

{% extends 'base.html' %}

{% block title %}Add Transaction - Personal Finance{% endblock %}

{% block content %}
<section class="form-card">
    <h2>Add Transaction</h2>
    {% if last_action_msg %}<div class="notice">{{ last_action_msg }}</div>{% endif %}
    <form method="post" enctype="multipart/form-data" class="transaction-form">
        {% csrf_token %}
        <div class="form-row">
            <label class="form-label">Date</label>
            <input class="form-input" type="date" name="date" required>
        </div>

        <div class="form-row">
            <label class="form-label">Description</label>
            <input class="form-input" type="text" name="description" placeholder="e.g. Grocery, Salary, Rent" required>
        </div>

        <div class="form-row">
            <label class="form-label">Amount</label>
            <input class="form-input" type="number" step="0.01" name="amount" placeholder="0.00" required>
            <div class="form-help">Use negative amounts for expenses, positive for income.</div>
        </div>

        <div class="form-row">
            <label class="form-label">Receipt (optional)</label>
            <input class="form-input form-file" type="file" name="receipt" accept="image/*,.pdf">
        </div>

        <div class="form-row">
            <button class="btn submit" type="submit">Add Transaction</button>
        </div>
    </form>
</section>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;

        }
        h2 {
            color: #333;
            margin-bottom: 20px;

        }
        form {
            margin-top: 20px;

        }
        input[type="text"], input[type="password"] {
            padding: 10px;
            margin-bottom: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;


        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;

        }
        button:hover {
            background-color: #45a049;
            
        }
    </style>
    <title>MFA Portal</title>
</head>
<body>

<h2>Multi Factor Authentication</h2>
<hr>

{% block content %}
{% endblock %}

</body>
</html>

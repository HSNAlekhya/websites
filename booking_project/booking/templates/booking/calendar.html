<!DOCTYPE html>
<html>
<head>
    <title>Booking Calendar</title>

    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        td {
            border: 1px solid #ebb6b6;
            padding: 10px;
            text-align: center;

        }

        th {
            background: #f1d4d4;
            padding: 10px;
            
        }

        .empty {
            background:rgb(155, 148, 148);
        }

        .form-container {
            margin-top: 20px;
            padding: 20px;
            border: 2px solid #4502fe;
            border-radius: 5px;
            background-color: #f8dbf3;
            text-align: center;
            height: 300px;
        }
        
        button {
            background: #037f37;
            color: #fff;
            border: 2px solid #000000;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
        }
        
    </style>

</head>
<body>

<h1>{{ month_name }} {{ year }}</h1>

<table>
    <tr>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
        <th>Sat</th>
        <th>Sun</th>
    </tr>

    {% for week in calendar %}
    <tr>

        {% for day in week %}

            {% if day == 0 %}
                <td class="empty"></td>
            {% else %}
                <td>{{ day }}</td>
            {% endif %}

        {% endfor %}

    </tr>
    {% endfor %}

</table>

<hr>
<div class="form-container">
    <h2>Create Booking</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Book Appointment
    </button>

</form>
</div>
</body>
</html>

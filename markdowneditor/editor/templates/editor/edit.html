{% extends "editor/base.html" %}

{% block content %}

        ← Back

</div>

<div class="content">

    <h2>Edit Document: {{ document.title }}</h2>

        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update</button>
    </form>

</div>

{% endblock %}

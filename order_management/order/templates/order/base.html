{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Order Desk{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/orders.css' %}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{% url 'order-list' %}"><span class="brand-mark">OD</span> Order Desk</a>
        <a class="button button-primary" href="{% url 'order-create' %}">+ New order</a>
    </header>
    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
